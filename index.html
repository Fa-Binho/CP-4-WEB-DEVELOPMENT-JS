<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrend - E-commerce Sustentável</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <i class="fas fa-leaf"></i>
                    <span>EcoTrend</span>
                </div>
                <div class="nav-menu">
                    <a href="#home" class="nav-link">Início</a>
                    <a href="#products" class="nav-link">Produtos</a>
                    <a href="#about" class="nav-link">Sobre</a>
                </div>
                <button class="cart-toggle" id="cartToggle">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1>Bem-vindo à EcoTrend</h1>
                <p>Descubra produtos sustentáveis para um estilo de vida mais consciente</p>
                <a href="#products" class="cta-button">Explorar Produtos</a>
            </div>
        </section>

        <section id="products" class="products-section">
            <div class="container">
                <h2>Nossos Produtos</h2>
                
                <div class="filters">
                    <div class="filter-group">
                        <label for="categoryFilter">Categoria:</label>
                        <select id="categoryFilter">
                            <option value="all">Todas as Categorias</option>
                            <option value="clothing">Roupas Sustentáveis</option>
                            <option value="beauty">Beleza Natural</option>
                            <option value="home">Casa Sustentável</option>
                            <option value="tech">Tecnologia Verde</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="priceFilter">Faixa de Preço:</label>
                        <select id="priceFilter">
                            <option value="all">Todos os Preços</option>
                            <option value="0-50">Até R$ 50</option>
                            <option value="50-100">R$ 50 - R$ 100</option>
                            <option value="100-200">R$ 100 - R$ 200</option>
                            <option value="200+">Acima de R$ 200</option>
                        </select>
                    </div>
                </div>

                <div class="products-grid" id="productsGrid">
                </div>
            </div>
        </section>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Seu Carrinho</h3>
            <button class="close-cart" id="closeCart">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total: R$ <span id="cartTotal">0.00</span></span>
            </div>
            <button class="checkout-btn">Finalizar Compra</button>
            <button class="clear-cart-btn" id="clearCart">Limpar Carrinho</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <footer>
        <div class="container">
            <p>&copy; 2025 EcoTrend. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
